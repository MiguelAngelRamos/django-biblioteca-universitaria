<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca Universitaria (ORM Avanzado)</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 2rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'libro_list' %}">
                <i class="fa-solid fa-graduation-cap text-warning"></i> Biblioteca Univ.
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navs">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navs">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'libro_list' %}"><i class="fa-solid fa-book"></i> Libros (CRUD)</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'estudiante_list' %}"><i class="fa-solid fa-users"></i> Estudiantes (SPs)</a></li>
                    <li class="nav-item"><a class="nav-link text-warning fw-bold" href="{% url 'reporte_avanzado' %}">
                        <i class="fa-solid fa-database"></i> Reporte SQL Crudo
                    </a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <!-- Handler de Mensajes y SweetAlert2 -->
        {% if messages %}
            {% for message in messages %}
                <script>
                    Swal.fire({
                        icon: '{{ message.tags }}' === 'error' ? 'error' : 'success',
                        title: 'Mensaje del Sistema',
                        text: '{{ message|escapejs }}', // El escapejs evita que las comillas o saltos de línea rompan el JavaScript visual
                        timer: 5000,
                        showConfirmButton: false,
                        position: 'top-end',
                        toast: true
                    })
                </script>
            {% endfor %}
        {% endif %}
        
        <!-- Contenedor dinámico -->
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
